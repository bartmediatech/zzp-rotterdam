<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZZP-ers in Rotterdam — Visualisatie per buurt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="title">ZZP-ers in Rotterdam</h1>
      <p class="subtitle">ZZP-ers per buurt in Rotterdam, 2009–2022</p>
    </header>

    <div class="hero-container">
      <canvas id="hero-canvas"></canvas>
      <div id="year-overlay" class="year-overlay">2009</div>
    </div>

    <div class="controls">
      <div class="legend">
        <span class="legend-label">Minder ZZP-ers</span>
        <div class="legend-gradient"></div>
        <span class="legend-label">Meer ZZP-ers</span>
      </div>
      <div id="stats-display" class="stats-display"></div>
    </div>

    <div class="year-controls">
      <button id="play-pause" class="play-pause" title="Pauzeer">❚❚</button>
      <div id="year-selector" class="year-selector"></div>
    </div>

    <div class="sm-section">
      <p class="sm-title">Alle jaren</p>
      <div id="small-multiples" class="small-multiples"></div>
    </div>

    <footer class="footer">
      <p>Bron: CBS, bewerking OBI &middot; onderzoek010.nl &middot; 1 inktstreek &asymp; 1 ZZP-er</p>
    </footer>
  </div>

  <div id="tooltip" class="tooltip"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
